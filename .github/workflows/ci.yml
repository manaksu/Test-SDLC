name: CI

on:
  push:
    branches: ['feature/**', 'feat/**', 'main']
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sdlc:
    uses: ManaksAI/sdlc-templates/.github/workflows/standard-sdlc.yml@v1
