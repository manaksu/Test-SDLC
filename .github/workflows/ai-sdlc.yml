name: AI SDLC

on:
  issues:
    types: [labeled]

jobs:
  ai-sdlc:
    if: github.event.label.name == 'requirement' || github.event.label.name == 'approved'
    uses: ManaksAI/sdlc-templates/.github/workflows/ai-sdlc.yml@v1
    secrets: inherit
    with:
      auto_implement: false   # analysis-only for the first runs
